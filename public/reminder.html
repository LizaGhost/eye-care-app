<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eye Care Reminder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .reminder-container {
      text-align: center;
      color: white;
      width: 100%;
      max-width: 500px;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 56px;
      margin-bottom: 20px;
      font-weight: 700;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .message {
      font-size: 28px;
      margin-bottom: 40px;
      font-weight: 500;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
      line-height: 1.4;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    button {
      flex: 1;
      padding: 18px 30px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #start-button {
      background: white;
      color: #ff6b6b;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    #start-button:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
    }

    #close-button {
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border: 2px solid white;
      backdrop-filter: blur(10px);
    }

    #close-button:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: scale(1.02);
    }

    .emoji {
      display: block;
      font-size: 72px;
      margin-bottom: 15px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }
  </style>
</head>
<body>
  <div class="reminder-container">
    <span class="emoji">👀</span>
    <h1>Разминка для глаз</h1>
    <p class="message">Сядь ровно и расслабься</p>
    <div class="button-group">
      <button id="start-button">Начать разминку</button>
      <button id="close-button">Отложить</button>
    </div>
  </div>

  <script src="../dist/renderer/reminder.js"></script>
</body>
</html>
